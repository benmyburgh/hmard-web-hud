<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>HMARD Web HUD</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell" aria-label="HMARD web HUD">
      <canvas id="hud" width="600" height="600" aria-label="HMARD pitch ladder HUD"></canvas>
      <section class="controls" aria-label="HUD controls">
        <button id="mode">DEMO</button>
        <button id="cage">CENTER</button>
        <button id="alert">ALERT</button>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
